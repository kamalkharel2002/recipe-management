<div class="flex flex-col gap-4">
  <div class="flex justify-between items-center">
    <h1 class="text-xl font-semibold">Recipes</h1>
    <a routerLink="/recipes/create">
      <p-button label="New Recipe" icon="pi pi-plus" />
    </a>
  </div>

  <div class="flex gap-3">
    <div class="flex-1">
      <app-recipe-search (searchChange)="searchQuery.set($event)" />
    </div>
    <app-recipe-filter [availableTags]="availableTags()" (tagsChange)="selectedTags.set($event)" />
    <app-recipe-sort (sortChange)="sortBy.set($event)" />
  </div>

  @if (loading()) {
    <div class="flex justify-center py-12">
      <i class="pi pi-spin pi-spinner text-3xl text-neutral-400"></i>
    </div>
  } @else if (filteredRecipes().length === 0) {
    <div class="text-center py-12 text-neutral-500">
      @if (allRecipes().length === 0) {
        <p>No recipes yet — add your first one!</p>
      } @else {
        <p>No recipes match your search or filters.</p>
      }
    </div>
  } @else {
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      @for (recipe of filteredRecipes(); track recipe.id) {
        <app-recipe-card [recipe]="recipe" (deleteRequested)="recipeToDelete.set($event)" />
      }
    </div>
  }
</div>

<app-delete-recipe-dialog
  [recipe]="recipeToDelete()"
  (confirmed)="confirmDelete()"
  (cancelled)="recipeToDelete.set(null)"
/>
