<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-6 max-w-2xl">
  <div class="flex flex-col gap-1">
    <label class="text-sm font-medium">Title</label>
    <input pInputText formControlName="title" />
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-medium">Description</label>
    <input pInputText formControlName="description" />
  </div>

  <div class="flex gap-4">
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium">Cook time (minutes)</label>
      <p-inputNumber formControlName="cookTime" [min]="1" />
    </div>
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium">Servings</label>
      <p-inputNumber formControlName="servings" [min]="1" />
    </div>
  </div>

  <app-ingredient-form [ingredients]="ingredients" />
  <app-step-form [steps]="steps" />

  <p-button
    type="submit"
    [label]="recipeId != null ? 'Update Recipe' : 'Create Recipe'"
    [loading]="saving()"
  />
</form>
