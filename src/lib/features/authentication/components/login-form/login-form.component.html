<form [formGroup]="form" (ngSubmit)="submitted.emit()" class="flex flex-col gap-4 w-80">
  <div class="flex flex-col gap-1">
    <label for="email" class="text-sm font-medium">Email</label>
    <input pInputText id="email" formControlName="email" class="w-full" />
    @if (form.get('email')?.touched && form.get('email')?.invalid) {
      <small class="text-red-600">Enter a valid email address.</small>
    }
  </div>

  <div class="flex flex-col gap-1">
    <label for="password" class="text-sm font-medium">Password</label>
    <p-password
      inputId="password"
      formControlName="password"
      [feedback]="false"
      [toggleMask]="true"
      styleClass="w-full"
    />
    @if (form.get('password')?.touched && form.get('password')?.invalid) {
      <small class="text-red-600">Password must be at least 8 characters.</small>
    }
  </div>

  @if (errorMessage) {
    <p-message severity="error" [text]="errorMessage" />
  }

  <p-button type="submit" label="Log in" [loading]="loading" [disabled]="form.invalid" />
</form>
