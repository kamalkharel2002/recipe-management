<form [formGroup]="form" (ngSubmit)="submitted.emit()" class="flex flex-col gap-4 max-w-sm">
  <div class="flex flex-col gap-1">
    <label class="text-sm font-medium">Name</label>
    <input pInputText formControlName="name" />
    @if (form.get('name')?.touched && form.get('name')?.invalid) {
      <small class="text-red-600">Tag name is required.</small>
    }
  </div>

  <div class="flex flex-col gap-1">
    <label class="text-sm font-medium">Color</label>
    <p-colorPicker formControlName="color" />
  </div>

  <p-button type="submit" label="Save Tag" [loading]="saving" />
</form>
