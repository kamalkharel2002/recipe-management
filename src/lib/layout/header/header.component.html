<header class="flex items-center justify-between px-6 py-3 border-b bg-white app-dark:bg-neutral-900">
  <span class="text-lg font-semibold">Recipe Manager</span>

  <div class="flex items-center gap-2">
    <p-button
      [icon]="theme.isDark() ? 'pi pi-sun' : 'pi pi-moon'"
      [rounded]="true"
      [text]="true"
      (onClick)="theme.toggle()"
    />
    <!-- Logout button will be wired to AuthService in the auth-feature part -->
    <p-button label="Logout" icon="pi pi-sign-out" [text]="true" />
  </div>
</header>
